<!DOCTYPE html>
<html>

<head>
    <title>SmartLink</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: #0f172a;
        }

        .card {
            width: 400px;
            margin: auto;
            margin-top: 80px;
            padding: 20px;
            background: #111827;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="nav">
        <div>SMARTLINK</div>
    </div>

    <div class="card">

        <h3>Login / Signup</h3>

        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">

        <button onclick="signup()">Signup</button>
        <button onclick="login()">Login</button>

        <hr>

        <h3>Short URL</h3>

        <input id="url" placeholder="Paste URL here">
        <button onclick="shorten()">Shorten</button>

        <div id="result"></div>
    </div>

    <script>

        let token = "";

        function signup() {
            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: document.getElementById("user").value,
                    password: document.getElementById("pass").value
                })
            })
                .then(r => r.json())
                .then(d => alert(d.message || d.error));
        }

        function login() {
            fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: document.getElementById("user").value,
                    password: document.getElementById("pass").value
                })
            })
                .then(r => r.json())
                .then(d => {
                    if (d.token) {
                        token = d.token;
                        localStorage.setItem("token", token);
                        alert("Logged in!");
                    } else {
                        alert(d.error);
                    }
                });
        }

        function shorten() {
            const url = document.getElementById("url").value;

            fetch("/api/shorten", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify({ url })
            })
                .then(r => r.json())
                .then(d => {
                    document.getElementById("result").innerHTML = `
            <p><b>Short:</b> <a href="${d.short_url}" target="_blank">${d.short_url}</a></p>
            <p><b>Risk:</b> ${d.risk_level}</p>
            <p><b>Score:</b> ${d.score}</p>
            <p><b>Reasons:</b> ${d.reasons}</p>
        `;
                });
        }

    </script>

</body>

</html>
