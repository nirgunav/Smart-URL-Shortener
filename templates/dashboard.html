<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .nav {
            padding: 15px;
            background: #0f172a;
            color: #38bdf8;
        }

        table {
            width: 95%;
            margin: 20px auto;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #1f2937;
        }

        th {
            background: #111827;
            color: #38bdf8;
        }

        tr:hover {
            background: #111827;
        }

        button {
            padding: 6px 10px;
            background: red;
            border: none;
            color: white;
            border-radius: 5px;
        }
    </style>

</head>

<body>

    <div class="nav">
        Smart Dashboard
    </div>

    <h3 style="margin:20px;">Stats: {{total}} Links | {{clicks}} Clicks</h3>

    <table>
        <tr>
            <th>Short</th>
            <th>URL</th>
            <th>Clicks</th>
            <th>Risk</th>
            <th>Delete</th>
        </tr>

        {% for link in links %}
        <tr>
            <td>{{link.short_code}}</td>
            <td>{{link.original_url}}</td>
            <td>{{link.cclicks}}</td>
            <td>{{link.risk_level}}</td>
            <td>
                <button onclick="del('{{link.id}}')">Delete</button>
            </td>
        </tr>
        {% endfor %}
    </table>

    <script>
        function del(id) {
            fetch("/api/delete/" + id, {
                method: "DELETE",
                headers: {
                    Authorization: "Bearer " + localStorage.getItem("token")
                }
            }).then(() => location.reload());
        }
    </script>

</body>

</html>
