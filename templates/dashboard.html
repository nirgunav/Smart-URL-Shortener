<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: #0f172a;
        }

        .box {
            padding: 20px;
            margin: 20px;
            background: #111827;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #1f2937;
        }

        th {
            color: #38bdf8;
        }

        button {
            background: #ef4444;
            border: none;
            padding: 6px 10px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="nav">
        <h2>Dashboard</h2>
        <a href="/" style="color:#38bdf8;">Logout</a>
    </div>

    <div class="box">
        <h3>Your Links</h3>

        <table>
            <tr>
                <th>Code</th>
                <th>URL</th>
                <th>Clicks</th>
                <th>Risk</th>
                <th>Action</th>
            </tr>

            {% for link in links %}
            <tr>
                <td>{{link.short_code}}</td>
                <td>{{link.original_url}}</td>
                <td>{{link.cclicks}}</td>
                <td>{{link.risk_level}}</td>
                <td>
                    <button onclick="del('{{link.id}}')">Delete</button>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

    <script>
        function del(id) {
            fetch("/api/delete/" + id, {
                method: "DELETE",
                headers: {
                    Authorization: "Bearer " + localStorage.getItem("token")
                }
            }).then(() => location.reload());
        }
    </script>

</body>

</html>
