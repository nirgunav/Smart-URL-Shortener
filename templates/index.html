<!DOCTYPE html>
<html>

<head>
    <title>Smart URL Shortener</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .nav h2 {
            margin: 0;
            color: #38bdf8;
        }

        .container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: #111827;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #0b1220;
            color: white;
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #2563eb;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #0b1220;
            border-radius: 10px;
            border: 1px solid #1f2937;
        }

        .circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .small {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
        }

        a {
            color: #38bdf8;
        }
    </style>
</head>

<body>

    <div class="nav">
        <h2>Smart URL Shortener</h2>
        <a href="/dashboard" style="color:#38bdf8;">Dashboard</a>
    </div>

    <div class="container">

        <!-- LEFT -->
        <div class="card">

            <h3>Shorten URL</h3>

            <input id="url" placeholder="Enter URL">
            <input id="custom" placeholder="Custom alias">
            <input type="date" id="expiry">

            <label>
                <input type="checkbox" id="one_time">
                One time link
            </label>

            <button onclick="shorten()">Generate</button>

            <div id="result"></div>

        </div>

        <!-- RIGHT -->
        <div class="card">
            <h3>Features</h3>
            <p>✔ Secure Links</p>
            <p>✔ QR Code Generator</p>
            <p>✔ AI Risk Detection</p>
            <p>✔ Click Tracking</p>
        </div>

    </div>

    <script>
        function shorten() {

            let token = localStorage.getItem("token");
            if (!token) return alert("Login required");

            fetch("/api/shorten", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    url: document.getElementById("url").value,
                    custom: document.getElementById("custom").value,
                    expiry: document.getElementById("expiry").value,
                    one_time: document.getElementById("one_time").checked
                })
            })
                .then(r => r.json())
                .then(data => {

                    if (!data.short_url) {
                        document.getElementById("result").innerHTML = data.error;
                        return;
                    }

                    let color =
                        data.risk_level === "Safe" ? "#38bdf8" :
                            data.risk_level === "Suspicious" ? "#f59e0b" :
                                "#ef4444";

                    document.getElementById("result").innerHTML = `
            <div class="circle" style="background:${color}">
                ${data.score}/10
            </div>

            <p class="small">${data.short_url}</p>

            <img src="${data.qr}" width="120">
        `;
                });
        }
    </script>

</body>

</html>
