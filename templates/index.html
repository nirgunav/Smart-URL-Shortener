<!DOCTYPE html>
<html>

<head>
    <title>Smart URL Shortener</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .nav h2 {
            color: #38bdf8;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 90vh;
        }

        .left,
        .right {
            padding: 40px;
        }

        .card {
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #0b1220;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        #shortenSection {
            display: none;
        }

        #result {
            margin-top: 15px;
        }

        a {
            color: #38bdf8;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div class="nav">
        <h2>Smart URL Shortener</h2>
        <div>Secure • QR • Analytics</div>
    </div>

    <div class="container">

        <!-- LEFT: AUTH -->
        <div class="left">

            <div class="card">
                <h3>Signup</h3>
                <input id="su_username" placeholder="Username">
                <input id="su_password" type="password" placeholder="Password">
                <button onclick="signup()">Create Account</button>
            </div>

            <div class="card">
                <h3>Login</h3>
                <input id="username" placeholder="Username">
                <input id="loginPassword" type="password" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>

        </div>

        <!-- RIGHT: APP -->
        <div class="right">

            <div class="card" id="shortenSection">
                <h3>Shorten URL</h3>

                <input id="url" placeholder="Enter URL">
                <input id="custom" placeholder="Custom alias">
                <input type="date" id="expiry">
                <label><input type="checkbox" id="one_time"> One time link</label>

                <button onclick="shorten()">Generate</button>

                <div id="result"></div>
            </div>

        </div>

    </div>

    <script>
        function signup() {
            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: su_username.value,
                    password: su_password.value
                })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.token) {
                        localStorage.setItem("token", data.token);
                        alert("Signup success");
                    } else {
                        alert(data.error);
                    }
                });
        }

        function login() {
            fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: username.value,
                    password: loginPassword.value
                })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.token) {
                        localStorage.setItem("token", data.token);
                        alert("Login success");
                    } else {
                        alert("Login failed");
                    }
                });
        }

        function shorten() {
            fetch("/api/shorten", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify({
                    url: url.value,
                    custom: custom.value,
                    expiry: expiry.value,
                    one_time: one_time.checked
                })
            })
                .then(r => r.json())
                .then(data => {

                    if (!data.short_url) {
                        result.innerHTML = data.error;
                        return;
                    }

                    result.innerHTML = `
            <p><b>Short URL:</b></p>
            <a href="${data.short_url}" target="_blank">${data.short_url}</a>
            <br><br>
            <img src="${data.qr}" width="120">
        `;
                });
        }
    </script>

</body>

</html>
